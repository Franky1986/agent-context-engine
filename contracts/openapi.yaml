openapi: 3.1.0
info:
  title: Agent Context Engine Monitor API
  version: 0.2.1
  description: Incremental contract for the Agent Context Engine React monitor.
servers:
  - url: http://127.0.0.1:8787
paths:
  /api/openapi.json:
    get:
      operationId: getOpenApiJson
      summary: Read the monitor OpenAPI contract as JSON.
      responses:
        '200':
          description: OpenAPI JSON document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/status:
    get:
      operationId: getStatus
      summary: Read compact monitor status.
      responses:
        '200':
          description: Monitor status payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorStatus'
  /api/runtime/reconcile:
    post:
      operationId: reconcileRuntime
      summary: Reconcile launchagent runtime configuration against current repo defaults.
      responses:
        '200':
          description: Runtime reconciliation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeReconcileResponse'
  /api/integrations:
    get:
      operationId: getIntegrations
      summary: Read integration, provider, and model readiness state.
      responses:
        '200':
          description: Integration status payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSummary'
  /api/installation-check:
    get:
      operationId: getInstallationCheck
      summary: Read the stored installation profile and current setup gaps.
      responses:
        '200':
          description: Installation check payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationCheckResponse'
  /api/integrations-hooks:
    post:
      operationId: manageIntegrationHooks
      summary: Enable or disable integration hooks for the current Agent Context Engine root.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationHookMutationRequest'
      responses:
        '200':
          description: Integration hook mutation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationHookMutationResult'
  /api/diagnostics:
    get:
      operationId: getDiagnostics
      summary: Run monitor-safe diagnostics and runtime configuration checks.
      parameters:
        - in: query
          name: relocation
          schema:
            type: boolean
        - in: query
          name: codex_features
          schema:
            type: boolean
      responses:
        '200':
          description: Diagnostics payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsStatus'
  /api/sessions:
    get:
      operationId: getSessions
      summary: Read monitor session list.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: q
          schema:
            type: string
      responses:
        '200':
          description: Session list payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
  /api/session:
    get:
      operationId: getSession
      summary: Read one monitor session detail.
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session detail payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
  /api/stats:
    get:
      operationId: getStats
      summary: Read monitor statistics buckets and grouped token usage.
      parameters:
        - in: query
          name: range
          schema:
            type: string
        - in: query
          name: start
          schema:
            type: string
        - in: query
          name: end
          schema:
            type: string
        - in: query
          name: client
          schema:
            type: string
        - in: query
          name: project
          schema:
            type: string
        - in: query
          name: workdir
          schema:
            type: string
      responses:
        '200':
          description: Statistics payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorStatsResponse'
  /api/risks:
    get:
      operationId: getRisks
      summary: Read monitor risk event list.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Risk event list payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskListResponse'
  /api/risk:
    get:
      operationId: getRisk
      summary: Read one monitor risk event detail.
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Risk event detail payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskDetail'
  /api/firewall-state:
    get:
      operationId: getFirewallState
      summary: Read firewall state, scoped overrides, and audit rows.
      responses:
        '200':
          description: Firewall state payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallState'
    post:
      operationId: setFirewallState
      summary: Enable or disable the monitor firewall.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetFirewallStateRequest'
      responses:
        '200':
          description: Updated firewall state payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallState'
  /api/firewall-override:
    post:
      operationId: createFirewallOverride
      summary: Create a scoped monitor firewall override.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFirewallOverrideRequest'
      responses:
        '200':
          description: Created override and updated state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallOverrideMutationResult'
    delete:
      operationId: revokeFirewallOverride
      summary: Revoke a scoped monitor firewall override.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeFirewallOverrideRequest'
      responses:
        '200':
          description: Revoked override and updated state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallOverrideMutationResult'
  /api/firewall-rules:
    get:
      operationId: getFirewallRules
      summary: Read monitor firewall rules.
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: kind
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Firewall rules payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallRulesResponse'
  /api/firewall-suggestions:
    get:
      operationId: getFirewallSuggestions
      summary: Read monitor firewall rule suggestions.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Firewall suggestion payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallSuggestionsResponse'
  /api/personal:
    get:
      operationId: getPersonalFiles
      summary: Read personal memory file list.
      responses:
        '200':
          description: Personal memory file list payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalFilesResponse'
  /api/personal-file:
    get:
      operationId: getPersonalFile
      summary: Read one personal memory markdown file.
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Personal memory file payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalFile'
    post:
      operationId: savePersonalFile
      summary: Save one personal memory markdown file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavePersonalFileRequest'
      responses:
        '200':
          description: Saved personal memory file payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalFile'
  /api/repo-index:
    get:
      operationId: getRepoIndex
      summary: Read the local repository index markdown file.
      responses:
        '200':
          description: Repository index payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoIndexFile'
    post:
      operationId: saveRepoIndex
      summary: Save the local repository index markdown file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRepoIndexRequest'
      responses:
        '200':
          description: Saved repository index payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoIndexFile'
  /api/dreams:
    get:
      operationId: getDreams
      summary: Read recent dream runs.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: runner
          schema:
            type: string
      responses:
        '200':
          description: Dream run list payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamRunListResponse'
  /api/dream-queue:
    get:
      operationId: getDreamQueue
      summary: Read queued dream jobs.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: session
          schema:
            type: string
      responses:
        '200':
          description: Dream queue payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamQueueResponse'
  /api/dream-v2-evaluate:
    get:
      operationId: evaluateDreamV2Runs
      summary: Read Dream v2 evaluation rows.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Dream v2 evaluation payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamV2EvaluationResponse'
  /api/dream-v2-fixture-evaluate:
    post:
      operationId: evaluateDreamV2Fixture
      summary: Run and inspect a Dream v2 fixture evaluation.
      responses:
        '200':
          description: Dream v2 fixture evaluation payload.
          content:
            application/json:
              schema:
                type: object
  /api/dream-graph:
    get:
      operationId: getDreamGraph
      summary: Read semantic graph artifacts for one dream run.
      parameters:
        - in: query
          name: dream_run_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dream graph payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamGraphResponse'
  /api/graph-artifact:
    get:
      operationId: getGraphArtifact
      summary: Read graph artifact detail.
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Graph artifact detail payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphArtifactDetail'
  /api/graph-table-options:
    get:
      operationId: getGraphTableOptions
      summary: Read graph table filter options and counts.
      responses:
        '200':
          description: Graph table options payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphTableOptions'
  /api/graph-entities:
    get:
      operationId: getGraphEntities
      summary: Read graph entity rows.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: memory_view
          schema:
            type: string
            enum: [both, deterministic, semantic]
      responses:
        '200':
          description: Graph entity list payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphEntityListResponse'
  /api/graph-relations:
    get:
      operationId: getGraphRelations
      summary: Read graph relation rows.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: memory_view
          schema:
            type: string
            enum: [both, deterministic, semantic]
      responses:
        '200':
          description: Graph relation list payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphRelationListResponse'
  /api/graph:
    get:
      operationId: queryGraph
      summary: Query graph data for monitor visualization.
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: view
          schema:
            type: string
        - in: query
          name: source
          schema:
            type: string
            enum: [sqlite, neo4j]
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: memory_view
          schema:
            type: string
            enum: [both, deterministic, semantic]
      responses:
        '200':
          description: Graph query payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQueryResponse'
  /api/storage:
    get:
      operationId: getStorage
      summary: Read SQLite storage diagnostics.
      responses:
        '200':
          description: Storage status payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageStatus'
  /api/storage/neo4j:
    get:
      operationId: getNeo4jStorage
      summary: Read Neo4j storage diagnostics.
      responses:
        '200':
          description: Neo4j storage status payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Neo4jStorageStatus'
components:
  schemas:
    InstanceMetadata:
      type: object
      additionalProperties: true
      properties:
        version:
          type: integer
        instance_id:
          type: string
        installation_root:
          type: string
        memory_root:
          type: string
        product_version:
          type: string
        backend_version:
          type: string
        monitor_version:
          type: string
        storage_schema_version:
          type: integer
        monitor_host:
          type: string
        monitor_port:
          type: integer
        language:
          type: string
        wrapper_prefix:
          type: string
        wrapper_suffix:
          type: string
        launchagent_label:
          type: string
        launchagent_path:
          type: string
        launchagent_env_file:
          type: string
        checkout_name:
          type: string
        checkout_branch:
          type: string
        checkout_commit:
          type: string
        checkout_remote:
          type: string
        checkout_dirty:
          type: boolean
        checkout_detected_at:
          type: string
        installed_at:
          type: string
        installed_by_version:
          type: string
        last_updated_at:
          type: string
        last_updated_by_version:
          type: string
        last_seen_at:
          type: string
        last_successful_doctor_at:
          type: string
        last_successful_check_at:
          type: string
    MonitorStatus:
      type: object
      additionalProperties: true
      properties:
        runner:
          type: string
        monitor_version:
          type: string
        project_version:
          type: string
        backend_version:
          type: string
        root:
          type: string
        install_root:
          type: string
        memory_root:
          type: string
        storage_schema_version:
          type: integer
        storage_attached_at:
          type: string
        storage_profile_path:
          type: string
        storage_instance_id:
          type: string
        user_state_root:
          type: string
        user_config_path:
          type: string
        instance_metadata_path:
          type: string
        instance_metadata:
          $ref: '#/components/schemas/InstanceMetadata'
        ok:
          type: boolean
        generated_at:
          type: string
        sessions:
          type: integer
        events:
          type: integer
        pending_summaries:
          type: integer
        pending_dreams:
          type: integer
        running_dreams:
          type: integer
        queued_events:
          type: integer
        firewall:
          $ref: '#/components/schemas/FirewallState'
        hooks:
          $ref: '#/components/schemas/HookControlState'
        system_control:
          $ref: '#/components/schemas/SystemControlStatus'
        hook_queue:
          $ref: '#/components/schemas/HookQueueStatus'
        integrations:
          $ref: '#/components/schemas/IntegrationSummary'
        monitor_process:
          $ref: '#/components/schemas/MonitorProcessStatus'
        launchagent:
          $ref: '#/components/schemas/LaunchAgentStatus'
    SystemControlStatus:
      type: object
      additionalProperties: true
      properties:
        schema_version:
          type: integer
        mode:
          type: string
          enum: [enabled, disabling, disabled, enabling, partial]
        scope:
          type: string
        reason:
          type: string
        operation_id:
          type: string
        disabled_at:
          type: string
        updated_at:
          type: string
        admission_open:
          type: boolean
        state_valid:
          type: boolean
        state_path:
          type: string
        anchor_path:
          type: string
        integrity:
          type: string
          enum: [virgin_uninitialized, legacy_unanchored, anchored, invalid]
        provenance_assurance:
          type: string
          enum: [instrumented_runner_event_unverified]
        memory_root:
          type: string
        recovery_command:
          type: string
        previous:
          type: object
          additionalProperties: true
        background_drain:
          type: object
          additionalProperties: true
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
        last_error:
          type: string
    HookQueueStatus:
      type: object
      additionalProperties: true
      properties:
        queued_events:
          type: integer
        failed_events:
          type: integer
        oldest_queued_at:
          type: string
        oldest_failed_at:
          type: string
        degraded:
          type: boolean
        degradation_reasons:
          type: array
          items:
            type: string
        queue_log:
          $ref: '#/components/schemas/HookQueueLogSummary'
        bridge_log:
          $ref: '#/components/schemas/HookQueueLogSummary'
        worker:
          $ref: '#/components/schemas/HookQueueWorkerStatus'
    HookQueueLogSummary:
      type: object
      additionalProperties: true
      properties:
        path:
          type: string
        exists:
          type: boolean
        has_error:
          type: boolean
        last_at:
          type: string
        last_message:
          type: string
    HookQueueWorkerStatus:
      type: object
      additionalProperties: true
      properties:
        running:
          type: boolean
        pid:
          type: integer
        started_at:
          type: string
        heartbeat_at:
          type: string
        last_reason:
          type: string
        last_exit_at:
          type: string
        stale:
          type: boolean
    MonitorProcessStatus:
      type: object
      additionalProperties: true
      properties:
        pid:
          type: integer
        runner:
          type: string
        version:
          type: string
        root:
          type: string
        cwd:
          type: string
        python_executable:
          type: string
        argv:
          type: array
          items:
            type: string
        started_at_epoch:
          type: number
        port:
          type: integer
        host:
          type: string
        language:
          type: string
        latest_runtime_change_epoch:
          type: number
        stale:
          type: boolean
        stale_reason:
          type: string
        restart_command:
          type: string
    LaunchAgentSnapshot:
      type: object
      additionalProperties: true
      properties:
        label:
          type: string
        plist_path:
          type: string
        program:
          type: string
        program_arguments:
          type: array
          items:
            type: string
        working_directory:
          type: string
        interval_seconds:
          type: integer
        stdout_path:
          type: string
        stderr_path:
          type: string
        env_file:
          type: string
        managed_env:
          type: object
          additionalProperties:
            type: string
        secret_presence:
          type: object
          additionalProperties:
            type: boolean
        fingerprint:
          type: string
        spec_version:
          type: string
    LaunchAgentDrift:
      type: object
      additionalProperties: true
      properties:
        detected:
          type: boolean
        reasons:
          type: array
          items:
            type: string
    LaunchAgentRuntime:
      type: object
      additionalProperties: true
      properties:
        state:
          type: string
        runs:
          type: integer
        last_exit_code:
          type: string
        pid:
          type: integer
    LaunchAgentStatus:
      type: object
      additionalProperties: true
      properties:
        supported:
          type: boolean
        label:
          type: string
        expected:
          $ref: '#/components/schemas/LaunchAgentSnapshot'
        installed:
          $ref: '#/components/schemas/LaunchAgentSnapshot'
        loaded:
          type: boolean
        runtime:
          $ref: '#/components/schemas/LaunchAgentRuntime'
        drift:
          $ref: '#/components/schemas/LaunchAgentDrift'
        recommended_command:
          type: string
    RuntimeReconcileResponse:
      type: object
      additionalProperties: true
      properties:
        status:
          type: string
        result:
          type: object
          additionalProperties: true
    IntegrationSummary:
      type: object
      additionalProperties: true
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationStatusItem'
        total:
          type: integer
        ready:
          type: integer
        not_ready:
          type: integer
    InstallationAction:
      type: object
      additionalProperties: true
      properties:
        code:
          type: string
        message:
          type: string
        command:
          type: string
    InstallationCheckResponse:
      type: object
      additionalProperties: true
      properties:
        root:
          type: string
        profile:
          type: object
          additionalProperties: true
        profile_path:
          type: string
        runtime:
          type: object
          additionalProperties: true
        frontend:
          type: object
          additionalProperties: true
        integrations:
          $ref: '#/components/schemas/IntegrationSummary'
        workflow_checks:
          type: array
          items:
            type: object
            additionalProperties: true
        findings:
          type: array
          items:
            type: object
            additionalProperties: true
        repair_actions:
          type: array
          items:
            $ref: '#/components/schemas/InstallationAction'
        manual_actions:
          type: array
          items:
            $ref: '#/components/schemas/InstallationAction'
        agent_actions:
          type: array
          items:
            $ref: '#/components/schemas/InstallationAction'
    IntegrationStatusItem:
      type: object
      additionalProperties: true
      properties:
        client:
          type: string
        label:
          type: string
        ingress_transport:
          type: string
        runner:
          type: string
        provider:
          type: string
        ready:
          type: boolean
        auth_status:
          type: string
        readiness_status:
          type: string
        selected_model:
          type: string
        selected_small_model:
          type: string
        recommended_model:
          type: string
        recommended_small_model:
          type: string
        wrapper_command:
          type: string
        global_command_name:
          type: string
        global_command_available:
          type: boolean
        global_command_path:
          type: string
        global_activation_command:
          type: string
        global_deactivation_command:
          type: string
        global_status_command:
          type: string
        wrapper_path:
          type: string
        wrapper_path_exists:
          type: boolean
        wrapper_state:
          type: string
        wrapper_ready:
          type: boolean
        prepared:
          type: boolean
        hooks_manageable:
          type: boolean
        hooks_state:
          type: string
        hooks_enabled:
          type: boolean
        hook_local_state:
          type: string
        hook_effective_state:
          type: string
        hook_config_state:
